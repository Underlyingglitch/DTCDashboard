services:
    init:
        image: registry.rickokkersen.nl/dtcdashboard/cli:latest
        command: ['sh', '-c', 'php artisan migrate --force']
        env_file:
            - .env.local
    redis:
        image: redis:latest
        container_name: redis
        ports:
            - "6379:6379"
        volumes:
            - ./local_data/redis.conf:/usr/local/etc/redis/redis.conf
        command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    php:
        image: registry.rickokkersen.nl/dtcdashboard/fpm_server:latest
        env_file:
            - .env.local
        depends_on:
            - socket_server
            - redis
            - init
    web:
        image: registry.rickokkersen.nl/dtcdashboard/web_server:latest
        ports:
            - "80:80"
        env_file:
            - .env.local
        depends_on:
            - php
    cron:
        image: registry.rickokkersen.nl/dtcdashboard/cron:latest
        env_file:
            - .env.local
        depends_on:
            - init
    queue:
        image: registry.rickokkersen.nl/dtcdashboard/queue_worker:latest
        env_file:
            - .env.local
        depends_on:
            - redis
            - init
    queue-sync:
        image: registry.rickokkersen.nl/dtcdashboard/queue_worker:latest
        env_file:
            - .env.local
        command: "php artisan queue:work --queue=sync --tries=3"
        depends_on:
            - redis
            - init
    socket_server:
        image: registry.rickokkersen.nl/dtcdashboard/socket_server:latest
        ports:
            - "8081:8080"
        env_file:
            - .env.local
