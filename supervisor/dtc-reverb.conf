[program:dtc-reverb]
process_name=%(program_name)s
command=php /var/www/dtc-dashboard/artisan reverb:start --host=0.0.0.0 --port=8080
autostart=true
autorestart=true
stopwaitsecs=3600
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/supervisor/dtc-reverb.log
user=www-data
environment=PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",HOME="/var/www/dtc-dashboard",LARAVEL_TINKER_WITHOUT_PAYER=true
