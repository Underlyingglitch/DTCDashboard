services:
    mariadb:
        image: mariadb:latest
        container_name: mariadb
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-dtc_dashboard}
            MYSQL_USER: ${DB_USERNAME:-dtc_user}
            MYSQL_PASSWORD: ${DB_PASSWORD:-password}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
            MYSQL_ROOT_HOST: "%"
        ports:
            - "3306:3306"
        volumes:
            - mariadb_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            timeout: 20s
            retries: 10

    init:
        image: registry.rickokkersen.nl/dtcdashboard/cli:latest
        command: ["sh", "-c", "php artisan migrate --force"]
        env_file:
            - .env
        depends_on:
            mariadb:
                condition: service_healthy

    redis:
        image: redis:latest
        container_name: redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            timeout: 3s
            retries: 5

    php:
        image: registry.rickokkersen.nl/dtcdashboard/fpm_server:latest
        env_file:
            - .env
        depends_on:
            - socket_server
            - redis
            - init

    web:
        image: registry.rickokkersen.nl/dtcdashboard/web_server:latest
        ports:
            - "80:80"
        env_file:
            - .env
        depends_on:
            - php

    cron:
        image: registry.rickokkersen.nl/dtcdashboard/cli:latest
        command: ["crond", "-l", "2", "-f"]
        env_file:
            - .env
        depends_on:
            - init

    queue:
        image: registry.rickokkersen.nl/dtcdashboard/cli:latest
        command:
            [
                "php",
                "artisan",
                "queue:work",
                "--verbose",
                "--tries=3",
                "--timeout=90",
            ]
        env_file:
            - .env
        depends_on:
            - redis
            - init

    queue-sync:
        image: registry.rickokkersen.nl/dtcdashboard/cli:latest
        command:
            [
                "php",
                "artisan",
                "queue:work",
                "--queue=sync",
                "--verbose",
                "--tries=3",
                "--timeout=90",
            ]
        env_file:
            - .env
        depends_on:
            - redis
            - init

    socket_server:
        image: registry.rickokkersen.nl/dtcdashboard/cli:latest
        command: ["php", "artisan", "reverb:start"]
        ports:
            - "8080:8080"
        env_file:
            - .env
        depends_on:
            - redis

    mqtt:
        image: eclipse-mosquitto:latest
        container_name: mqtt
        ports:
            - "1883:1883"
            - "9001:9001"
        volumes:
            - mqtt_data:/mosquitto/data
            - mqtt_logs:/mosquitto/log
        environment:
            MOSQUITTO_USERNAME: ${MQTT_USERNAME:-mosquitto}
            MOSQUITTO_PASSWORD: ${MQTT_PASSWORD:-mosquitto}
        healthcheck:
            test:
                [
                    "CMD",
                    "mosquitto_sub",
                    "-h",
                    "localhost",
                    "-t",
                    "test",
                    "-u",
                    "${MQTT_USERNAME:-mosquitto}",
                    "-P",
                    "${MQTT_PASSWORD:-mosquitto}",
                ]
            timeout: 5s
            retries: 5

volumes:
    mariadb_data:
    redis_data:
    mqtt_data:
    mqtt_logs:
